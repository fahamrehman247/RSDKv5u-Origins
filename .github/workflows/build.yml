name: Bulk Build Engine Binary (Plus Unlocked)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure MSBuild Environment
      uses: microsoft/setup-msbuild@v2

    - name: Download Visual Studio Static Packages via Vcpkg
      run: |
        vcpkg install libogg libtheora glew glfw3 sdl2 --triplet=x64-windows-static

    - name: Run CMake Config and Force Enable Plus DLC
      run: |
        # FIXED: Removed the aggressive "-A x64" argument and used structural fallback variable strings instead
        cmake -B build -S . `
          -DCMAKE_GENERATOR_PLATFORM=x64 `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static `
          -DRETRO_DISABLE_PLUS=OFF

    - name: Execute Release Build
      run: |
        cmake --build build --config Release

    - name: Export Windows Artifact Zip
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5U-Windows-x64
        path: build/Release/

  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Initialize JDK Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK Profile Tools
      uses: android-actions/setup-android@v3

    - name: Fetch Core Audio Dependencies
      run: |
        cd dependencies/android
        mkdir -p libogg libtheora
        curl -L https://xiph.org | tar -xz -C libogg --strip-components=1
        curl -L https://xiph.org | tar -xz -C libtheora --strip-components=1

    - name: Inject Android Plus Flag Properties
      run: |
        # FIXED: Uses an open search string that targets "DISABLE_PLUS" regardless of the word placement or quotes
        sed -i 's/DISABLE_PLUS ON/DISABLE_PLUS OFF/g' CMakeLists.txt || true
        sed -i 's/DISABLE_PLUS 1/DISABLE_PLUS 0/g' CMakeLists.txt || true
        sed -i 's/DISABLE_PLUS TRUE/DISABLE_PLUS FALSE/g' CMakeLists.txt || true

    - name: Create Symbolic Framework Connections
      run: |
        cd dependencies/android/app/src/main/jni
        rm -rf RSDKv5 || true
        ln -sf "../../../../../.. " "RSDKv5"

    - name: Build Standalone Debug APK File via Gradle
      run: |
        cd dependencies/android
        chmod +x gradlew
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
        # FIXED: Clears cache structures to force a complete code rebuild from scratch
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon

    - name: Export Android Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5U-Android-Plus-APK
        path: dependencies/android/app/build/outputs/apk/debug/app-debug.apk
