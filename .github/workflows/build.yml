name: Universal Plus Autobuild

on: push

jobs:
  build-windows:
    name: Build Win64 Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Install vcpkg Dependencies
        run: |
          git clone https://github.com
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install glew sdl2 libogg libtheora libvorbis --triplet=x64-windows-static

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=./vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static -DVCPKG_MANIFEST_MODE=OFF -DRETRO_DISABLE_PLUS=OFF

      - name: Build Executable
        run: |
          cmake --build build --config Release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Win64-Plus
          path: build/Release/RSDKv5u.exe

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Android App (Plus Features Forced On)
        run: |
          cd android
          chmod +x gradlew
          # -PRETRO_DISABLE_PLUS=OFF injects the flag straight into Gradle's project properties
          ./gradlew assembleRelease -PRETRO_DISABLE_PLUS=OFF

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Android-Plus
          path: android/app/build/outputs/apk/release/*.apk
