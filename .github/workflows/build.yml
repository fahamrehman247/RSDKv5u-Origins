name: Bulk Build Engine Binary (Plus Unlocked)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  # ==========================================
  # JOB 1: WINDOWS RUNS ON A WINDOWS VIRTUAL MACHINE
  # ==========================================
  build-windows:
    runs-on: windows-2022
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure MSBuild Environment
      uses: microsoft/setup-msbuild@v2

    - name: Download Visual Studio Static Packages via Vcpkg
      run: |
        vcpkg install libogg libtheora glew glfw3 sdl2 --triplet=x64-windows-static

    - name: Run CMake Config and Force Enable Plus DLC
      run: |
        cmake -B build -S . -A x64 `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static `
          -DRETRO_DISABLE_PLUS=OFF

    - name: Execute Release Build
      run: |
        cmake --build build --config Release

    - name: Export Windows Artifact Zip
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5U-Windows-x64
        path: build/Release/

  # ==========================================
  # JOB 2: ANDROID RUNS ON A LINUX VIRTUAL MACHINE
  # ==========================================
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0 # FIXED: Prevents missing history from breaking paths

    - name: Initialize JDK Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK Profile Tools
      uses: android-actions/setup-android@v3

    - name: Fetch Core Audio Dependencies
      run: |
        cd dependencies/android
        mkdir -p libogg libtheora
        curl -L https://xiph.org | tar -xz -C libogg --strip-components=1
        curl -L https://xiph.org | tar -xz -C libtheora --strip-components=1

    - name: Inject Android Plus Flag Properties
      run: |
        # FIXED: Forces the global unlock to register BEFORE path connections compile
        sed -i 's/option(RETRO_DISABLE_PLUS "Disable Plus Content" ON)/option(RETRO_DISABLE_PLUS "Disable Plus Content" OFF)/g' CMakeLists.txt || true
        sed -i 's/RETRO_DISABLE_PLUS ON/RETRO_DISABLE_PLUS OFF/g' CMakeLists.txt || true

    - name: Create Symbolic Framework Connections
      run: |
        # FIXED: Safely cleans and establishes absolute folder links for the Android NDK
        cd dependencies/android/app/src/main/jni
        rm -rf RSDKv5 || true
        ln -sf "../../../../../.." "RSDKv5"

    - name: Build Standalone Debug APK File via Gradle
      run: |
        cd dependencies/android
        chmod +x gradlew
        # FIXED: Forces Gradle to accept Android licenses automatically in the cloud
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Export Android Artifact APK
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5U-Android-Plus-APK
        path: dependencies/android/app/build/outputs/apk/debug/app-debug.apk
