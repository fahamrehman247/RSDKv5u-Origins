name: Build RSDKv5u-Origins

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache Vcpkg Packages
      uses: actions/cache@v4
      with:
        path: |
          C:/vcpkg/downloads
          C:/vcpkg/installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Install All Media Dependencies via Vcpkg (Static)
      run: vcpkg install sdl2 glew glfw3 libogg libvorbis libtheora --triplet=x64-windows-static

    - name: Configure CMake
      run: |
        cmake -B build -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

    - name: Build Project
      run: cmake --build build --config Release --parallel 4

    - name: Upload Windows x64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5u-Origins-Windows-x64
        path: build/Release/

  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Java 11 (High Compatibility)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;25.2.9519653"

    - name: Bind Local Environment Mapping
      run: |
        cd dependencies/android
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties

    - name: Make Gradle Executable
      run: chmod +x dependencies/android/gradlew
      
    - name: Build with Gradle (ARM Debug Variant)
      env:
        _JAVA_OPTIONS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
      run: |
        cd dependencies/android
        ./gradlew assembleDebug -Pandroid.injected.build.abi="armeabi-v7a,arm64-v8a" --no-daemon --stacktrace
        
    - name: Upload Android ARM APKs
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5u-Origins-Android-ARM
        path: dependencies/android/app/build/outputs/apk/debug/
