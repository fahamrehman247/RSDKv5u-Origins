name: Build RSDKv5u-Origins

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5u-Origins-Windows
        path: build/Release/

  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;25.2.9519653"

    - name: Make Gradle Executable
      run: chmod +x dependencies/android/gradlew
      
    - name: Build with Gradle (ARM Only)
      run: |
        cd dependencies/android
        ./gradlew assembleRelease -Pandroid.injected.build.abi="armeabi-v7a,arm64-v8a"

    - name: Upload Android ARM APKs
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5u-Origins-Android-ARM
        path: dependencies/android/app/build/outputs/apk/release/
