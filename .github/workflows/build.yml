name: Build RSDKv5

on: workflow_dispatch

jobs:
  v5-windows-x64:
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            pkg-config 
            make 
            git 
            mingw-w64-x86_64-gcc 
            mingw-w64-x86_64-SDL2 
            mingw-w64-x86_64-libogg 
            mingw-w64-x86_64-libtheora

      - name: Patch Codebase Compilation Errors
        run: |
          # 1. Fix conflicting type definitions for LONG_PTR and ULONG_PTR
          sed -i 's/typedef LONG LONG_PTR;/\/\/ patched/g' ./RSDKv5/detours.h
          sed -i 's/typedef ULONG ULONG_PTR;/\/\/ patched/g' ./RSDKv5/detours.h
          
          # 2. Fix undeclared 'DllHandle' scope variable in main.cpp
          sed -i '/BOOL APIENTRY DllMain/i HMODULE DllHandle = NULL;' ./RSDKv5/main.cpp
          
          # 3. Fix invalid conversion from function pointer to PVOID in Hooks
          sed -i 's/implOf##functionName/(PVOID)implOf##functionName/g' ./RSDKv5/Helpers.h

      - name: Build RSDKv5 + U
        run: |
          make -j8 RSDK_ONLY=1 AUTOBUILD=1
          make clean
          make -j8 RSDK_ONLY=1 RSDK_REVISION=3 

      - name: Move artifacts
        run: |
          mkdir -p artifacts
          cp ./bin/Windows/DX9/*.exe ./artifacts/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v5-windows-x64
          path: artifacts
