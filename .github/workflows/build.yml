name: Windows Unsigned Autobuild

on: push

jobs:
  build-windows:
    name: Build Win64 Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg and Dependencies
        run: |
          git clone https://github.com
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install glew sdl2 libogg libtheora libvorbis --triplet=x64-windows-static

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static -DRETRO_DISABLE_PLUS=OFF

      - name: Build Executable
        run: |
          cmake --build build --config Release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Origins-Win64-Plus
          path: build/Release/RSDKv5u.exe
