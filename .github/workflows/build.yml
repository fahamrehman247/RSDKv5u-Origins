name: Build RSDKv5

on:
  push:
    paths:
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  v5-windows-gcc-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            pkg-config 
            make 
            git 
            mingw-w64-x86_64-gcc 
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-SDL2 
            mingw-w64-x86_64-libogg 
            mingw-w64-x86_64-libtheora

      # 1. RUN COMPILATION INSIDE MSYS2 (Required for MinGW tools to see paths)
      - name: Configure and Build Engine
        shell: msys2 {0}
        run: |
          cmake -B build -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # 2. UPLOAD ARTIFACT: Grabs your finished executable and creates a zip on GitHub
      - name: Upload Compiled RSDKv5 Binary
        uses: actions/upload-artifact@v4
        with:
          name: RSDKv5u-Origins-MinGW64  # The download name on your Actions tab
          path: |
            build/*.exe
            build/*.dll
